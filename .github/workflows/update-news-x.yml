name: Midday News & X Feed Refresh

on:
  schedule:
    # 12 PM ET daily (all 7 days) = 16:00 UTC
    - cron: '0 16 * * *'
  workflow_dispatch:

jobs:
  refresh-news-x:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Refresh news headlines
        env:
          OILPRICE_API_KEY: ${{ secrets.OILPRICE_API_KEY }}
        run: python3 refresh_news.py

      - name: Refresh X feed
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 refresh_x.py

      - name: Refresh CITGO & Venezuela X feed
        continue-on-error: true
        env:
          APIFY_API_TOKEN: ${{ secrets.APIFY_API_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 refresh_citgo.py

      - name: Build all HTML pages
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SITE_BASE_URL: https://www.morningoilbrief.com
          CHAT_ENDPOINT_URL: ${{ vars.CHAT_ENDPOINT_URL }}
        run: python3 build_index.py

      - name: Commit & push updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add news_data.json x_feed_data.json index.html margins.html curves.html news.html inventory.html x_feed.html .morning_brief_cache.json .narratives_cache.json
          git diff --staged --quiet || git commit -m "chore: midday news & x feed refresh [skip ci]"
          git push
